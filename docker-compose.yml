version: '3.9'

services:
  api:
    build: .
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    environment:
      - FLASK_DEBUG=1
      - MONGODB_DB=users
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USERNAME=admin
      - MONGODB_PASSWORD=admin
    volumes:
      - .:/app

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin


